Name: Febspot Bot Manual Mode

on:
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager

      - name: Run bot
        run: python -u bot.py 

      - name: Re-run Workflow Automatically
        if: always() 
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Menunggu 5 menit agar sistem tidak overload..."
          sleep 300
          gh workflow run "Febspot Bot Manual Mode"
